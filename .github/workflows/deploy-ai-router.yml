name: Deploy AI Router to VPS

on:
  push:
    branches: [master]
    paths:
      - 'ai_router_mcp.py'
      - 'ai_router_bridge.py'
      - '.github/workflows/deploy-ai-router.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /opt/ai-router
            # Backup current version
            cp ai_router_mcp.py ai_router_mcp.py.bak
            echo "Backup created"

      - name: Upload ai_router_mcp.py
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "ai_router_mcp.py"
          target: "/opt/ai-router/"
          overwrite: true

      - name: Restart service
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /opt/ai-router
            python3 -c "import py_compile; py_compile.compile('ai_router_mcp.py', doraise=True)" || exit 1
            systemctl restart ai-router
            sleep 3
            curl -s http://localhost:8769/health | python3 -c "import sys,json; d=json.load(sys.stdin); print(f'Deploy OK: {d[\"status\"]}, {len(d[\"models\"])} models')"

      - name: Notify Telegram
        if: success()
        run: |
          curl -s "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d "text=✅ AI Router deployed successfully from commit ${{ github.sha }}"
